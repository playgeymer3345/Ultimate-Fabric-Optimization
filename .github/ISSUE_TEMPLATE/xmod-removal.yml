name: "❌ Удаление мода / Mod removal"
description: "Предложить удалить или заменить мод из текущего состава сборки."
labels: ["mod", "remove"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🗑️ Запрос на удаление модификации
        Перед тем как предложить убрать какой-либо мод, пожалуйста, [убедитесь через поиск](https://github.com), что аналогичный запрос не был создан кем-то другим ранее.

  - type: input
    id: original_issue
    attributes:
      label: "🔗 Ссылка на тему добавления мода"
      description: "Укажите ссылку на GitHub или ID задачи (Issue), где этот мод изначально предлагался к добавлению."
      placeholder: "#123"
    validations:
      required: true

  - type: textarea
    id: why_was_added
    attributes:
      label: "❓ Зачем этот мод изначально добавлялся в сборку?"
      description: "Вспомните или скопируйте аргументы из старой темы о том, какую пользу этот мод приносил паку изначально."
    validations:
      required: true

  - type: textarea
    id: why_remove
    attributes:
      label: "🛑 Почему его НУЖНО удалить из сборки? (Ваши аргументы)"
      description: "Подробно и аргументированно распишите, почему этот мод сейчас лишний (вызывает баги, конфликты, лаги)."
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "📌 Дополнительные детали"
      description: "Всё, что вы хотите добавить от себя (необязательно)."
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: "🛡️ Подтверждение соглашения"
      options:
        - label: "Этот запрос написан добросовестно, с учётом причин, по которым мод был добавлен изначально. Я понимаю, что эта форма предназначена строго для удаления проблемных модов, а не для обычного предложения альтернатив."
          required: true
